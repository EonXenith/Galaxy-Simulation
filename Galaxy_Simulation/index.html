<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            space: { 900: '#0a0a1a', 800: '#111128', 700: '#1a1a3e', 600: '#252554' },
            cosmic: { cyan: '#00d4ff', teal: '#00b8a9', purple: '#8b5cf6', pink: '#ec4899', orange: '#f97316' }
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Exo 2', sans-serif; background: #0a0a1a; color: #e0e0e0; overflow: hidden; width: 100vw; height: 100vh; }
    #root { width: 100%; height: 100%; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 3px; }
    .glass-panel { background: rgba(10, 10, 30, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(0, 212, 255, 0.15); border-radius: 8px; }
    .tool-btn { transition: all 0.2s ease; border: 1px solid transparent; }
    .tool-btn:hover { background: rgba(0, 212, 255, 0.1); border-color: rgba(0, 212, 255, 0.3); }
    .tool-btn.active { background: rgba(0, 212, 255, 0.15); border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 0 12px rgba(0, 212, 255, 0.2); }
    .slider-cosmic { -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
    .slider-cosmic::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00d4ff; cursor: pointer; box-shadow: 0 0 8px rgba(0,212,255,0.5); }
    .speed-btn { transition: all 0.15s ease; }
    .speed-btn:hover { background: rgba(0, 212, 255, 0.15); }
    .speed-btn.active { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
    canvas { display: block; }
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0a1a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-screen h1 { font-size: 28px; font-weight: 600; color: #00d4ff; letter-spacing: 2px; }
    #loading-screen p { font-size: 14px; color: rgba(255,255,255,0.4); }
    .loader-ring {
      width: 48px; height: 48px; border: 3px solid rgba(0,212,255,0.15);
      border-top-color: #00d4ff; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

function Icon({ name, size = 18, className = "" }) {

// ─── Constants ───
var G_DEFAULT = 40;
var SOFTENING = 0.5;
var FIXED_DT = 1 / 60;
var MAX_BODIES = 2000;
var TRAIL_LENGTH = 120;
var VEL_CAP = 100;
var MAX_LIGHTS = 4;
var STARFIELD_COUNT = 4000;

var BODY_TYPES = {
  black_hole: { label: "Black Hole", icon: "circleDot", defaultMass: 50000, defaultRadius: 3, color: "#1a0a2e", minMass: 10000, maxMass: 200000, minRadius: 1.5, maxRadius: 8 },
  star: { label: "Star", icon: "star", defaultMass: 500, defaultRadius: 2.5, color: "#ffdd44", minMass: 50, maxMass: 5000, minRadius: 0.8, maxRadius: 5 },
  planet_rocky: { label: "Rocky Planet", icon: "circle", defaultMass: 5, defaultRadius: 0.8, color: "#4a90a4", minMass: 0.5, maxMass: 50, minRadius: 0.3, maxRadius: 2 },
  planet_gas: { label: "Gas Giant", icon: "circle", defaultMass: 30, defaultRadius: 1.8, color: "#c4956a", minMass: 5, maxMass: 200, minRadius: 1, maxRadius: 4 },
  moon: { label: "Moon", icon: "moon", defaultMass: 0.3, defaultRadius: 0.35, color: "#aaaaaa", minMass: 0.01, maxMass: 2, minRadius: 0.1, maxRadius: 0.8 },
  asteroid: { label: "Asteroid", icon: "dot", defaultMass: 0.01, defaultRadius: 0.15, color: "#887766", minMass: 0.001, maxMass: 0.5, minRadius: 0.05, maxRadius: 0.3 },
};

var STAR_COLORS = [
  { temp: 3000, color: new THREE.Color(1.0, 0.4, 0.2) },
  { temp: 5000, color: new THREE.Color(1.0, 0.7, 0.3) },
  { temp: 6000, color: new THREE.Color(1.0, 0.95, 0.8) },
  { temp: 8000, color: new THREE.Color(0.8, 0.85, 1.0) },
  { temp: 15000, color: new THREE.Color(0.6, 0.7, 1.0) },
  { temp: 30000, color: new THREE.Color(0.5, 0.55, 1.0) },
];

function tempToColor(temp) {
  for (var i = 0; i < STAR_COLORS.length - 1; i++) {
    if (temp <= STAR_COLORS[i + 1].temp) {
      var t = (temp - STAR_COLORS[i].temp) / (STAR_COLORS[i + 1].temp - STAR_COLORS[i].temp);
      return new THREE.Color().lerpColors(STAR_COLORS[i].color, STAR_COLORS[i + 1].color, Math.max(0, Math.min(1, t)));
    }
  }
  return STAR_COLORS[STAR_COLORS.length - 1].color.clone();
}

var PLANET_COLORS_ROCKY = ["#6b8e9b", "#a0522d", "#cd853f", "#8fbc8f", "#b0c4de", "#d2691e", "#708090", "#bc8f8f", "#4682b4"];
var PLANET_COLORS_GAS = ["#daa520", "#cd853f", "#d2b48c", "#f4a460", "#c4956a", "#e8c490", "#8B7355", "#DAA06D"];

var SUBTYPES = {
  planet_rocky: {
    earth_like: { label: "Earth-like", color: "#2e86c1" },
    oceanic:    { label: "Oceanic",    color: "#1a6fa0" },
    desert:     { label: "Desert",     color: "#d4a04a" },
    volcanic:   { label: "Volcanic",   color: "#cc3311" },

  },
  planet_gas: {

  },
  moon: {

  },
  asteroid: {
    rocky:    { label: "Rocky",    color: "#887766" },

    icy:      { label: "Icy",      color: "#bbccdd" },
  }
};

var bodyIdCounter = 0;
function nextId() { return ++bodyIdCounter; }

// ─── Unit Display ───
// Scales map simulation values to intuitive real-world-ish units
// Star mass 500 ≈ 1 Solar Mass, planet mass 5 ≈ 1 Earth Mass, etc.
var UNIT_SCALES = {
  mass: {
    black_hole:   { scale: 500, unit: "M\u2609", decimals: 1 },
    star:         { scale: 500, unit: "M\u2609", decimals: 2 },
    planet_rocky: { scale: 5,   unit: "M\u2295", decimals: 2 },
    planet_gas:   { scale: 5,   unit: "M\u2295", decimals: 1 },
    moon:         { scale: 0.3, unit: "M\u263D", decimals: 2 },
    asteroid:     { scale: 0.01,unit: "M\u263D", decimals: 3 },
  },
  radius: {
    black_hole:   { scale: 2.5,  unit: "R\u2609", decimals: 1 },
    star:         { scale: 2.5,  unit: "R\u2609", decimals: 2 },
    planet_rocky: { scale: 0.8,  unit: "R\u2295", decimals: 2 },
    planet_gas:   { scale: 0.8,  unit: "R\u2295", decimals: 2 },
    moon:         { scale: 0.35, unit: "R\u263D", decimals: 2 },
    asteroid:     { scale: 0.15, unit: "R\u263D", decimals: 2 },
  }
};
/** Format a simulation value with appropriate real-world unit */
function fmtUnit(val, field, bodyType) {
  var s = UNIT_SCALES[field] && UNIT_SCALES[field][bodyType];
  if (!s) return val.toFixed(2);
  return (val / s.scale).toFixed(s.decimals) + " " + s.unit;
}

/** Compute Keplerian orbital elements relative to the dominant (nearest massive) body */
function computeOrbitalElements(body, bodies, G) {
  // Find dominant body (most gravitational influence = max M/r²)
  var bestInfluence = 0, central = null;
  for (var i = 0; i < bodies.length; i++) {
    var b = bodies[i];
    if (b.id === body.id) continue;
    var dx = b.px - body.px, dy = b.py - body.py, dz = b.pz - body.pz;
    var r2 = dx * dx + dy * dy + dz * dz;
    var influence = b.mass / Math.max(r2, 1);
    if (influence > bestInfluence) { bestInfluence = influence; central = b; }
  }
  if (!central) return null;
  var mu = G * (central.mass + body.mass);
  var rx = body.px - central.px, ry = body.py - central.py, rz = body.pz - central.pz;
  var vx = body.vx - central.vx, vy = body.vy - central.vy, vz = body.vz - central.vz;
  var r = Math.sqrt(rx * rx + ry * ry + rz * rz);
  var v2 = vx * vx + vy * vy + vz * vz;
  // Specific energy
  var energy = v2 / 2 - mu / r;
  // Semi-major axis (negative for hyperbolic)
  var a = -mu / (2 * energy);
  // Angular momentum vector (cross product)
  var hx = ry * vz - rz * vy, hy = rz * vx - rx * vz, hz = rx * vy - ry * vx;
  var h = Math.sqrt(hx * hx + hy * hy + hz * hz);
  // Eccentricity vector
  var evx = (vy * hz - vz * hy) / mu - rx / r;
  var evy = (vz * hx - vx * hz) / mu - ry / r;
  var evz = (vx * hy - vy * hx) / mu - rz / r;
  var ecc = Math.sqrt(evx * evx + evy * evy + evz * evz);
  if (ecc >= 1 || a <= 0) return { bound: false, ecc: ecc, centralName: central.name || BODY_TYPES[central.type].label };
  // Orbital period
  var period = 2 * Math.PI * Math.sqrt(a * a * a / mu);
  return {
    bound: true,
    semiMajor: a,
    ecc: ecc,
    period: period,
    apoapsis: a * (1 + ecc),
    periapsis: a * (1 - ecc),
    centralName: central.name || BODY_TYPES[central.type].label
  };
}

// ─── Physics ───
function computeGravity(bodies, G) {
  var n = bodies.length;
  var ax = new Float64Array(n);
  var ay = new Float64Array(n);
  var az = new Float64Array(n);
  for (var i = 0; i < n; i++) {
    for (var j = i + 1; j < n; j++) {
      var dx = bodies[j].px - bodies[i].px;
      var dy = bodies[j].py - bodies[i].py;
      var dz = bodies[j].pz - bodies[i].pz;
      // Scale softening with combined mass for very massive pairs (black holes)
      // This prevents the artificial slingshot from fixed softening at close range
      var combinedMass = bodies[i].mass + bodies[j].mass;
      var soft = combinedMass > 5000 ? SOFTENING + Math.log10(combinedMass / 5000) * 3 : SOFTENING;
      var distSq = dx * dx + dy * dy + dz * dz + soft * soft;
      var dist = Math.sqrt(distSq);
      var force = G / (distSq * dist);
      ax[i] += dx * force * bodies[j].mass;
      ay[i] += dy * force * bodies[j].mass;
      az[i] += dz * force * bodies[j].mass;
      ax[j] -= dx * force * bodies[i].mass;
      ay[j] -= dy * force * bodies[i].mass;
      az[j] -= dz * force * bodies[i].mass;
    }
  }
  return { ax: ax, ay: ay, az: az };
}

// ─── Barnes-Hut O(n log n) gravity ───
var BH_THETA = 0.5;
// Flat-array octree: each node is 8 contiguous ints/floats
// Node: [childStart, totalMass, comX, comY, comZ, bodyIndex, halfSize, _pad]
var BH_NODE_SIZE = 8;
var bhNodes = null;
var bhNodeCount = 0;
var BH_MAX_NODES = 80000;

function bhReset() {
  if (!bhNodes || bhNodes.length < BH_MAX_NODES * BH_NODE_SIZE) {
    bhNodes = new Float64Array(BH_MAX_NODES * BH_NODE_SIZE);
  }
  bhNodeCount = 0;
}

function bhAlloc() {
  var idx = bhNodeCount++;
  var off = idx * BH_NODE_SIZE;
  bhNodes[off] = -1;     // childStart (-1 = no children)
  bhNodes[off + 1] = 0;  // totalMass
  bhNodes[off + 2] = 0;  // comX
  bhNodes[off + 3] = 0;  // comY
  bhNodes[off + 4] = 0;  // comZ
  bhNodes[off + 5] = -1; // bodyIndex (-1 = empty)
  bhNodes[off + 6] = 0;  // halfSize
  bhNodes[off + 7] = 0;  // centerX (reuse pad for center storage)
  return idx;
}

function bhInsert(nodeIdx, bi, bx, by, bz, bmass, cx, cy, cz, half) {
  if (bhNodeCount >= BH_MAX_NODES - 10) return; // safety
  var off = nodeIdx * BH_NODE_SIZE;
  bhNodes[off + 6] = half;
  bhNodes[off + 7] = cx;

  var existingBody = bhNodes[off + 5];
  var childStart = bhNodes[off];

  if (existingBody < 0 && childStart < 0) {
    // Empty leaf — place body here
    bhNodes[off + 5] = bi;
    bhNodes[off + 1] = bmass;
    bhNodes[off + 2] = bx;
    bhNodes[off + 3] = by;
    bhNodes[off + 4] = bz;
    return;
  }

  // Need to subdivide
  if (childStart < 0) {
    // Create 8 children
    var cs = bhNodeCount;
    bhNodes[off] = cs;
    for (var c = 0; c < 8; c++) bhAlloc();
    childStart = cs;

    // Re-insert existing body into appropriate child
    var ex = bhNodes[off + 2], ey = bhNodes[off + 3], ez = bhNodes[off + 4];
    var em = bhNodes[off + 1];
    var ebi = existingBody;
    bhNodes[off + 5] = -1;
    var newHalf = half * 0.5;
    var octant = (ex > cx ? 1 : 0) | (ey > cy ? 2 : 0) | (ez > cz ? 4 : 0);
    var ncx = cx + (octant & 1 ? newHalf : -newHalf);
    var ncy = cy + (octant & 2 ? newHalf : -newHalf);
    var ncz = cz + (octant & 4 ? newHalf : -newHalf);
    bhInsert(childStart + octant, ebi, ex, ey, ez, em, ncx, ncy, ncz, newHalf);
  }

  // Update COM
  var oldM = bhNodes[off + 1];
  var newM = oldM + bmass;
  bhNodes[off + 2] = (bhNodes[off + 2] * oldM + bx * bmass) / newM;
  bhNodes[off + 3] = (bhNodes[off + 3] * oldM + by * bmass) / newM;
  bhNodes[off + 4] = (bhNodes[off + 4] * oldM + bz * bmass) / newM;
  bhNodes[off + 1] = newM;

  // Insert new body into child
  var newHalf2 = half * 0.5;
  var octant2 = (bx > cx ? 1 : 0) | (by > cy ? 2 : 0) | (bz > cz ? 4 : 0);
  var ncx2 = cx + (octant2 & 1 ? newHalf2 : -newHalf2);
  var ncy2 = cy + (octant2 & 2 ? newHalf2 : -newHalf2);
  var ncz2 = cz + (octant2 & 4 ? newHalf2 : -newHalf2);
  bhInsert(bhNodes[off] + octant2, bi, bx, by, bz, bmass, ncx2, ncy2, ncz2, newHalf2);
}

function bhForce(nodeIdx, bi, bx, by, bz, G, softSq, ax, ay, az) {
  var off = nodeIdx * BH_NODE_SIZE;
  var childStart = bhNodes[off];
  var nm = bhNodes[off + 1];
  if (nm === 0) return;

  var dx = bhNodes[off + 2] - bx;
  var dy = bhNodes[off + 3] - by;
  var dz = bhNodes[off + 4] - bz;
  var distSq = dx * dx + dy * dy + dz * dz;

  if (childStart < 0) {
    // Leaf node
    if (bhNodes[off + 5] === bi) return; // skip self
    if (distSq < 0.0001) return;
    var d = Math.sqrt(distSq + softSq);
    var f = G * nm / (distSq + softSq) / d;
    ax[0] += dx * f;
    ay[0] += dy * f;
    az[0] += dz * f;
    return;
  }

  // Internal node — check opening angle
  var half = bhNodes[off + 6];
  var size = half * 2;
  if (size * size < BH_THETA * BH_THETA * distSq) {
    // Far enough — use COM approximation
    if (distSq < 0.0001) return;
    var d = Math.sqrt(distSq + softSq);
    var f = G * nm / (distSq + softSq) / d;
    ax[0] += dx * f;
    ay[0] += dy * f;
    az[0] += dz * f;
    return;
  }

  // Too close — recurse into children
  for (var c = 0; c < 8; c++) {
    bhForce(childStart + c, bi, bx, by, bz, G, softSq, ax, ay, az);
  }
}

function computeGravityBH(bodies, G) {
  var n = bodies.length;
  var axArr = new Float64Array(n);
  var ayArr = new Float64Array(n);
  var azArr = new Float64Array(n);

  if (n < 2) return { ax: axArr, ay: ayArr, az: azArr };

  // Find bounding box
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (var i = 0; i < n; i++) {
    var b = bodies[i];
    if (b.px < minX) minX = b.px; if (b.px > maxX) maxX = b.px;
    if (b.py < minY) minY = b.py; if (b.py > maxY) maxY = b.py;
    if (b.pz < minZ) minZ = b.pz; if (b.pz > maxZ) maxZ = b.pz;
  }
  var cx = (minX + maxX) * 0.5, cy = (minY + maxY) * 0.5, cz = (minZ + maxZ) * 0.5;
  var half = Math.max(maxX - minX, maxY - minY, maxZ - minZ) * 0.5 + 1;

  // Build tree
  bhReset();
  var root = bhAlloc();
  for (var i = 0; i < n; i++) {
    bhInsert(root, i, bodies[i].px, bodies[i].py, bodies[i].pz, bodies[i].mass, cx, cy, cz, half);
  }

  // Compute forces
  for (var i = 0; i < n; i++) {
    var b = bodies[i];
    var combinedMass = b.mass;
    var soft = combinedMass > 5000 ? SOFTENING + Math.log10(combinedMass / 5000) * 3 : SOFTENING;
    var softSq = soft * soft;
    var rax = [0], ray = [0], raz = [0];
    bhForce(root, i, b.px, b.py, b.pz, G, softSq, rax, ray, raz);
    axArr[i] = rax[0];
    ayArr[i] = ray[0];
    azArr[i] = raz[0];
  }
  return { ax: axArr, ay: ayArr, az: azArr };
}

/** Steps physics forward by dt. collisionMode: "merge"|"bounce"|"disabled" */
function stepPhysics(bodies, dt, G, collisionMode) {
  if (bodies.length === 0) return { bodies: bodies, collisions: [] };
  // Velocity Verlet integration (much better energy conservation than Euler)
  var gravFn = bodies.length > 50 ? computeGravityBH : computeGravity;
  var acc1 = gravFn(bodies, G);
  var halfDt = 0.5 * dt;
  for (var i = 0; i < bodies.length; i++) {
    var b = bodies[i];
    b.px += b.vx * dt + acc1.ax[i] * halfDt * dt;
    b.py += b.vy * dt + acc1.ay[i] * halfDt * dt;
    b.pz += b.vz * dt + acc1.az[i] * halfDt * dt;
  }
  var acc2 = gravFn(bodies, G);
  for (var i = 0; i < bodies.length; i++) {
    var b = bodies[i];
    b.vx += (acc1.ax[i] + acc2.ax[i]) * halfDt;
    b.vy += (acc1.ay[i] + acc2.ay[i]) * halfDt;
    b.vz += (acc1.az[i] + acc2.az[i]) * halfDt;
    // NaN guard: reset corrupted bodies to origin at rest
    if (b.px !== b.px || b.vx !== b.vx) {
      b.px = 0; b.py = 0; b.pz = 0; b.vx = 0; b.vy = 0; b.vz = 0;
    }
  }
  // Collisions — skip entirely in disabled mode
  if (collisionMode === "disabled") return { bodies: bodies, collisions: [] };
  var toRemove = new Set();
  var collisions = [];
  for (var i = 0; i < bodies.length; i++) {
    if (toRemove.has(i)) continue;
    for (var j = i + 1; j < bodies.length; j++) {
      if (toRemove.has(j)) continue;
      var dx = bodies[j].px - bodies[i].px;
      var dy = bodies[j].py - bodies[i].py;
      var dz = bodies[j].pz - bodies[i].pz;
      var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      var touchDist = (bodies[i].radius + bodies[j].radius) * 0.7;
      if (dist < touchDist) {
        if (collisionMode === "bounce") {
          // Elastic collision with coefficient of restitution = 1.0
          var nx = dx / Math.max(dist, 0.0001);
          var ny = dy / Math.max(dist, 0.0001);
          var nz = dz / Math.max(dist, 0.0001);
          var dvx = bodies[i].vx - bodies[j].vx;
          var dvy = bodies[i].vy - bodies[j].vy;
          var dvz = bodies[i].vz - bodies[j].vz;
          var dvDotN = dvx * nx + dvy * ny + dvz * nz;
          if (dvDotN > 0) {
            var m1 = bodies[i].mass, m2 = bodies[j].mass;
            var totalM = m1 + m2;
            var impulse1 = 2 * m2 / totalM * dvDotN;
            var impulse2 = 2 * m1 / totalM * dvDotN;
            bodies[i].vx -= impulse1 * nx;
            bodies[i].vy -= impulse1 * ny;
            bodies[i].vz -= impulse1 * nz;
            bodies[j].vx += impulse2 * nx;
            bodies[j].vy += impulse2 * ny;
            bodies[j].vz += impulse2 * nz;
            // Separate bodies so surfaces are exactly touching
            var overlap = touchDist - dist;
            var sep = overlap / 2 + 0.01;
            bodies[i].px -= sep * nx;
            bodies[i].py -= sep * ny;
            bodies[i].pz -= sep * nz;
            bodies[j].px += sep * nx;
            bodies[j].py += sep * ny;
            bodies[j].pz += sep * nz;
          }
        } else {
          // Merge mode (default)
          var ki = bodies[i].mass >= bodies[j].mass ? i : j;
          var ri = ki === i ? j : i;
          var a = bodies[ki], bm = bodies[ri];
          // Snapshot both bodies before mutation for unmerge support
          var survivorSnap = { id: a.id, type: a.type, mass: a.mass, radius: a.radius, px: a.px, py: a.py, pz: a.pz, vx: a.vx, vy: a.vy, vz: a.vz, color: a.color, temperature: a.temperature, subtype: a.subtype, diskSpeed: a.diskSpeed, name: a.name };
          var absorbedSnap = { id: bm.id, type: bm.type, mass: bm.mass, radius: bm.radius, px: bm.px, py: bm.py, pz: bm.pz, vx: bm.vx, vy: bm.vy, vz: bm.vz, color: bm.color, temperature: bm.temperature, subtype: bm.subtype, diskSpeed: bm.diskSpeed, name: bm.name };
          var totalMass = a.mass + bm.mass;
          var relVx = a.vx - bm.vx, relVy = a.vy - bm.vy, relVz = a.vz - bm.vz;
          var energy = Math.sqrt(relVx * relVx + relVy * relVy + relVz * relVz) * bm.mass;
          collisions.push({ x: bm.px, y: bm.py, z: bm.pz, color: bm.color, energy: energy, survivorSnap: survivorSnap, absorbedSnap: absorbedSnap });
          a.vx = (a.vx * a.mass + bm.vx * bm.mass) / totalMass;
          a.vy = (a.vy * a.mass + bm.vy * bm.mass) / totalMass;
          a.vz = (a.vz * a.mass + bm.vz * bm.mass) / totalMass;
          a.mass = totalMass;
          a.radius = Math.cbrt(Math.pow(a.radius, 3) + Math.pow(bm.radius, 3));
          toRemove.add(ri);
        }
      }
    }
  }
  if (toRemove.size > 0) return { bodies: bodies.filter(function(_, i) { return !toRemove.has(i); }), collisions: collisions };
  return { bodies: bodies, collisions: collisions };
}

    radius[i] = bodies[i].radius;
    if (bodies[i].id === targetId) idx = i;
  }
  if (idx < 0) return [];
  var path = [{ x: px[idx], y: py[idx], z: pz[idx] }];
  for (var s = 0; s < steps; s++) {
    var ax = 0, ay = 0, az = 0;
    for (var j = 0; j < n; j++) {
      if (j === idx) continue;
      var ddx = px[j] - px[idx], ddy = py[j] - py[idx], ddz = pz[j] - pz[idx];
      var distSq = ddx * ddx + ddy * ddy + ddz * ddz + SOFTENING * SOFTENING;
      var dist = Math.sqrt(distSq);
      var force = G / (distSq * dist);
      ax += ddx * force * mass[j];
      ay += ddy * force * mass[j];
      az += ddz * force * mass[j];
    }
    vx[idx] += ax * dt; vy[idx] += ay * dt; vz[idx] += az * dt;
    px[idx] += vx[idx] * dt; py[idx] += vy[idx] * dt; pz[idx] += vz[idx] * dt;
    path.push({ x: px[idx], y: py[idx], z: pz[idx] });
    // Terminate at collision
    for (var j = 0; j < n; j++) {
      if (j === idx) continue;
      var cdx = px[j] - px[idx], cdy = py[j] - py[idx], cdz = pz[j] - pz[idx];
      var cd = Math.sqrt(cdx * cdx + cdy * cdy + cdz * cdz);
      if (cd < (radius[idx] + radius[j]) * 0.7) return path;
    }
  }
  return path;
}

// ─── Body Helpers ───
function createBody(type, mass, radius, px, py, pz, vx, vy, vz, extra) {
  extra = extra || {};
  var cfg = BODY_TYPES[type];
  var color = extra.color || cfg.color;
  var temperature = extra.temperature || 5500;
  var subtype = extra.subtype || null;
  var diskSpeed = extra.diskSpeed || 0.008;
  if (type === "star") {
    temperature = extra.temperature || 3000 + Math.random() * 27000;
    color = "#" + tempToColor(temperature).getHexString();
  } else if (type === "planet_rocky") {
    if (!subtype) {
      var keys = Object.keys(SUBTYPES.planet_rocky);
      subtype = keys[Math.floor(Math.random() * keys.length)];
    }
    color = extra.color || SUBTYPES.planet_rocky[subtype].color;
  } else if (type === "planet_gas") {
    if (!subtype) {
      var keys = Object.keys(SUBTYPES.planet_gas);
      subtype = keys[Math.floor(Math.random() * keys.length)];
    }
    color = extra.color || SUBTYPES.planet_gas[subtype].color;
  } else if (type === "moon") {
    if (!subtype) {
      var keys = Object.keys(SUBTYPES.moon);
      subtype = keys[Math.floor(Math.random() * keys.length)];
    }
    color = extra.color || SUBTYPES.moon[subtype].color;
  } else if (type === "asteroid") {
    if (!subtype) {
      var keys = Object.keys(SUBTYPES.asteroid);
      subtype = keys[Math.floor(Math.random() * keys.length)];
    }
    color = extra.color || SUBTYPES.asteroid[subtype].color;
  }
  return { id: nextId(), type: type, mass: mass, radius: radius, px: px, py: py, pz: pz, vx: vx || 0, vy: vy || 0, vz: vz || 0, color: color, temperature: temperature, subtype: subtype, diskSpeed: diskSpeed, name: extra.name || "", trail: [] };
}

function generateSolarSystem(cx, cy, cz, cvx, cvy, cvz, G) {
  var bodies = [];
  var starMass = 300 + Math.random() * 700;
  var starTemp = 3500 + Math.random() * 20000;
  bodies.push(createBody("star", starMass, 2 + Math.random() * 1.5, cx, cy, cz, cvx || 0, cvy || 0, cvz || 0, { temperature: starTemp, color: "#" + tempToColor(starTemp).getHexString() }));
  var numPlanets = 3 + Math.floor(Math.random() * 6);
  for (var i = 0; i < numPlanets; i++) {
    var dist = 15 + i * (8 + Math.random() * 6);
    var angle = Math.random() * Math.PI * 2;
    var isGas = i >= numPlanets - 2 && Math.random() > 0.3;
    var type = isGas ? "planet_gas" : "planet_rocky";
    var cfg = BODY_TYPES[type];
    var mass = cfg.defaultMass * (0.5 + Math.random());
    var radius = cfg.defaultRadius * (0.6 + Math.random() * 0.8);
    var px = cx + Math.cos(angle) * dist;
    var pz = cz + Math.sin(angle) * dist;
    var py = cy;
    var orbitalSpeed = Math.sqrt((G * starMass) / dist);
    var vx = (cvx || 0) + -Math.sin(angle) * orbitalSpeed;
    var vz = (cvz || 0) + Math.cos(angle) * orbitalSpeed;
    bodies.push(createBody(type, mass, radius, px, py, pz, vx, cvy || 0, vz));
    if (Math.random() > 0.5) {
      var numMoons = 1 + Math.floor(Math.random() * 2);
      for (var m = 0; m < numMoons; m++) {
        var moonDist = radius * 3 + m * 2 + Math.random() * 2;
        var moonAngle = Math.random() * Math.PI * 2;
        var mpx = px + Math.cos(moonAngle) * moonDist;
        var mpz = pz + Math.sin(moonAngle) * moonDist;
        var moonSpeed = Math.sqrt((G * mass) / moonDist);
        var mvx = vx + -Math.sin(moonAngle) * moonSpeed;
        var mvz = vz + Math.cos(moonAngle) * moonSpeed;
        bodies.push(createBody("moon", 0.05 + Math.random() * 0.3, 0.15 + Math.random() * 0.25, mpx, py, mpz, mvx, 0, mvz));
      }
    }
  }
  return bodies;
}

function generateGalaxy(cx, cy, cz, G) {
  var bodies = [];
  var bhMass = 80000 + Math.random() * 40000;
  bodies.push(createBody("black_hole", bhMass, 3.5, cx, cy, cz, 0, 0, 0));
  var numStars = 250 + Math.floor(Math.random() * 150);
  var numArms = 2 + Math.floor(Math.random() * 3);
  var armSpread = 0.4 + Math.random() * 0.3;
  for (var i = 0; i < numStars; i++) {
    var arm = i % numArms;
    var armAngle = (arm / numArms) * Math.PI * 2;
    var distance = 20 + Math.random() * 450;
    var angle = armAngle + Math.log(distance + 1) * 1.2 + (Math.random() - 0.5) * armSpread;
    var x = cx + Math.cos(angle) * distance;
    var z = cz + Math.sin(angle) * distance;
    var y = cy + (Math.random() - 0.5) * distance * 0.06;
    var orbitalSpeed = Math.sqrt((G * bhMass) / Math.max(distance, 10)) * 0.85;
    var vx = -Math.sin(angle) * orbitalSpeed;
    var vz = Math.cos(angle) * orbitalSpeed;
    var temp = 3000 + Math.random() * 27000;
    bodies.push(createBody("star", 1 + Math.random() * 8, 0.4 + Math.random() * 1.2, x, y, z, vx, 0, vz, { temperature: temp, color: "#" + tempToColor(temp).getHexString() }));
  }
  return bodies;
}

// ─── Three.js Scene ───
class SceneManager {
  constructor(canvas) {
    this.canvas = canvas;
    this.contextLost = false;

    // Set canvas size before requesting context
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Register context loss handlers BEFORE creating WebGL context
    canvas.addEventListener("webglcontextlost", function(e) { e.preventDefault(); this.contextLost = true; console.warn("WebGL context lost - will restore"); }.bind(this));
    canvas.addEventListener("webglcontextrestored", function() { this.contextLost = false; console.log("WebGL context restored"); }.bind(this));

    // Manually acquire WebGL context with low-power preference for Safari compatibility
    var glAttrs = { alpha: false, antialias: true, powerPreference: "low-power", failIfMajorPerformanceCaveat: false, preserveDrawingBuffer: false };
    var gl = canvas.getContext("webgl2", glAttrs) || canvas.getContext("webgl", glAttrs);
    if (!gl || gl.isContextLost()) {
      throw new Error("Your browser could not create a WebGL context. Close other browser tabs (especially those with 3D/maps/video) and try again.");
    }

    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
    this.camera.position.set(0, 80, 120);
    this.camera.lookAt(0, 0, 0);
    this.renderer = new THREE.WebGLRenderer({ canvas: canvas, context: gl });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.scene.add(new THREE.AmbientLight(0x445577, 1.6));
    this.scene.add(new THREE.HemisphereLight(0x6688bb, 0x222244, 0.4));

    this.bodyMeshes = new Map();
    this.glowSprites = new Map();
    this.trailLines = new Map();
    this.accretionDisks = new Map();
    this.pointLights = new Map();
    this.labelSprites = new Map();
    this.sphereGeoHigh = new THREE.SphereGeometry(1, 32, 24);
    this.sphereGeo = new THREE.SphereGeometry(1, 24, 16);
    this.lowSphereGeo = new THREE.SphereGeometry(1, 8, 6);
    this.glowTexture = this._makeGlowTex();
    this._makeStarfield();
    this._makeLaunchArrow();
    this._makeSelRing();
    this.raycaster = new THREE.Raycaster();
    this.camTarget = new THREE.Vector3(0, 0, 0);
    this.camDist = 150;
    this.camPhi = Math.PI / 4;
    this.camTheta = 0;
    this.followId = null;
    this.explosions = [];
    this._makeTrajectoryLine();
    this._updateCam();
  }

  _makeGlowTex() {
    var s = 128, c = document.createElement("canvas");
    c.width = s; c.height = s;
    var ctx = c.getContext("2d");
    var g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    g.addColorStop(0, "rgba(255,255,255,1)");
    g.addColorStop(0.1, "rgba(255,255,255,0.8)");
    g.addColorStop(0.3, "rgba(255,220,150,0.3)");
    g.addColorStop(0.6, "rgba(255,150,50,0.05)");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
    return new THREE.CanvasTexture(c);
  }

  _makeLabelTex(text) {
    var c = document.createElement("canvas");
    var ctx = c.getContext("2d");
    var fontSize = 48;
    ctx.font = "bold " + fontSize + "px 'Exo 2', sans-serif";
    var metrics = ctx.measureText(text);
    var w = Math.ceil(metrics.width) + 16;
    var h = fontSize + 16;
    c.width = w; c.height = h;
    ctx.font = "bold " + fontSize + "px 'Exo 2', sans-serif";
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, w / 2, h / 2);
    var tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    return { texture: tex, aspect: w / h };
  }

  _makeStarfield() {
    var pos = new Float32Array(STARFIELD_COUNT * 3);
    var col = new Float32Array(STARFIELD_COUNT * 3);
    for (var i = 0; i < STARFIELD_COUNT; i++) {
      var th = Math.random() * Math.PI * 2;
      var ph = Math.acos(2 * Math.random() - 1);
      var r = 15000 + Math.random() * 35000;
      pos[i*3] = r * Math.sin(ph) * Math.cos(th);
      pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
      pos[i*3+2] = r * Math.cos(ph);
      var br = 0.3 + Math.random() * 0.7;
      var ti = Math.random();
      col[i*3] = br * (ti > 0.95 ? 1 : ti > 0.9 ? 0.6 : 1);
      col[i*3+1] = br * (ti > 0.95 ? 0.7 : ti > 0.9 ? 0.7 : 1);
      col[i*3+2] = br * (ti > 0.95 ? 0.5 : ti > 0.9 ? 1 : 1);
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
    this.scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 2, sizeAttenuation: false, vertexColors: true, transparent: true, opacity: 0.8, depthWrite: false })));
  }

  _makeLaunchArrow() {
    var geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(6), 3));
    this.launchArrow = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 1.0, linewidth: 2, depthTest: false }));
    this.launchArrow.renderOrder = 999;
    this.launchArrow.visible = false;
    this.scene.add(this.launchArrow);
  }

  _makeSelRing() {
    this.selRing = new THREE.Mesh(new THREE.RingGeometry(1, 1.2, 48), new THREE.MeshBasicMaterial({ color: 0x00d4ff, side: THREE.DoubleSide, transparent: true, opacity: 0.6, depthTest: false }));
    this.selRing.visible = false;
    this.selRing.rotation.x = -Math.PI / 2;
    this.scene.add(this.selRing);
  }

  _updateCam() {
    this.camera.position.set(
      this.camTarget.x + this.camDist * Math.sin(this.camPhi) * Math.cos(this.camTheta),
      this.camTarget.y + this.camDist * Math.cos(this.camPhi),
      this.camTarget.z + this.camDist * Math.sin(this.camPhi) * Math.sin(this.camTheta)
    );
    this.camera.lookAt(this.camTarget);
  }

  pan(dx, dz) {
    var right = new THREE.Vector3();
    right.crossVectors(this.camera.up, new THREE.Vector3().subVectors(this.camTarget, this.camera.position)).normalize();
    var fwd = new THREE.Vector3().subVectors(this.camTarget, this.camera.position);
    fwd.y = 0; fwd.normalize();
    this.camTarget.add(right.multiplyScalar(-dx * this.camDist * 0.002));
    this.camTarget.add(fwd.multiplyScalar(dz * this.camDist * 0.002));
    this.followId = null;
    this._updateCam();
  }

  orbit(dt, dp) {
    this.camTheta += dt;
    this.camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, this.camPhi + dp));
    this._updateCam();
  }

  zoom(f) {
    this.camDist = Math.max(3, Math.min(50000, this.camDist * f));
    this._updateCam();
  }

  follow(body) {
    if (body) { this.followId = body.id; this.camTarget.set(body.px, body.py, body.pz); this._updateCam(); }
  }

  resetView() {
    this.camTarget.set(0, 0, 0); this.camDist = 150; this.camPhi = Math.PI / 4; this.camTheta = 0; this.followId = null; this._updateCam();
  }

  worldPos(sx, sy) {
    var ndc = new THREE.Vector2((sx / window.innerWidth) * 2 - 1, -(sy / window.innerHeight) * 2 + 1);
    this.raycaster.setFromCamera(ndc, this.camera);
    var t = new THREE.Vector3();
    this.raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 1, 0), 0), t);
    return t;
  }

  hitTest(sx, sy, bodies) {
    var ndc = new THREE.Vector2((sx / window.innerWidth) * 2 - 1, -(sy / window.innerHeight) * 2 + 1);
    this.raycaster.setFromCamera(ndc, this.camera);
    var meshes = [], map = new Map();
    for (var b of bodies) { var m = this.bodyMeshes.get(b.id); if (m) { meshes.push(m); map.set(m, b); } }
    var hits = this.raycaster.intersectObjects(meshes);
    return hits.length > 0 ? map.get(hits[0].object) : null;
  }

  sync(bodies, trails, selId) {
    var ids = new Set();
    for (var body of bodies) { ids.add(body.id); this._syncBody(body); if (trails && body.type !== "asteroid") this._syncTrail(body); }
    var staleIds = [];
    for (var [id] of this.bodyMeshes) { if (!ids.has(id)) staleIds.push(id); }
    for (var si = 0; si < staleIds.length; si++) this._rm(staleIds[si]);
    if (selId != null) {
      var sb = bodies.find(function(b) { return b.id === selId; });
      if (sb) { this.selRing.visible = true; this.selRing.position.set(sb.px, sb.py + 0.1, sb.pz); var sc = sb.radius * 2.5; this.selRing.scale.set(sc, sc, sc); }
      else { this.selRing.visible = false; }
    } else { this.selRing.visible = false; }
    if (this.followId) {
      var ft = bodies.find(function(b) { return b.id === this.followId; }.bind(this));
      if (ft) { this.camTarget.set(ft.px, ft.py, ft.pz); this._updateCam(); } else { this.followId = null; }
    }
  }

  _rm(id) {
    var m = this.bodyMeshes.get(id); if (m) { this.scene.remove(m); if (m.material) m.material.dispose(); this.bodyMeshes.delete(id); }
    var g = this.glowSprites.get(id); if (g) { this.scene.remove(g); if (g.material) { g.material.dispose(); } this.glowSprites.delete(id); }
    var t = this.trailLines.get(id); if (t) { this.scene.remove(t); if (t.geometry) t.geometry.dispose(); if (t.material) t.material.dispose(); this.trailLines.delete(id); }
    var d = this.accretionDisks.get(id); if (d) { this.scene.remove(d); if (d.geometry) d.geometry.dispose(); if (d.material) d.material.dispose(); this.accretionDisks.delete(id); }
    var l = this.pointLights.get(id); if (l) { this.scene.remove(l); this.pointLights.delete(id); }
    var lb = this.labelSprites.get(id); if (lb) { this.scene.remove(lb); if (lb.material) { if (lb.material.map) lb.material.map.dispose(); lb.material.dispose(); } this.labelSprites.delete(id); }
  }

  _syncBody(body) {
    var mesh = this.bodyMeshes.get(body.id);
    if (!mesh) {
      var c = new THREE.Color(body.color);
      var mat;
      if (body.type === "star") {
        mat = new THREE.MeshBasicMaterial({ color: c });
      } else if (body.type === "black_hole") {
        mat = new THREE.MeshBasicMaterial({ color: 0x050510 });
      } else {
        var emissiveColor = c.clone().multiplyScalar(0.35);
        mat = new THREE.MeshStandardMaterial({ color: c, emissive: emissiveColor, emissiveIntensity: 0.6, roughness: 0.6, metalness: 0.2 });
      }
      var geo = body.type === "asteroid" ? this.lowSphereGeo : this.sphereGeo;
      mesh = new THREE.Mesh(geo, mat);
      this.bodyMeshes.set(body.id, mesh);
      this.scene.add(mesh);
      if (body.type === "star" || body.type === "black_hole") {
        var gc = new THREE.Color(body.type === "black_hole" ? "#7c3aed" : body.color);
        var sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: this.glowTexture, color: gc, transparent: true, opacity: body.type === "black_hole" ? 0.6 : 0.45, blending: THREE.AdditiveBlending, depthWrite: false }));
        var gs = body.radius * (body.type === "black_hole" ? 10 : 6);
        sp.scale.set(gs, gs, 1);
        this.glowSprites.set(body.id, sp);
        this.scene.add(sp);
      }
      if (body.type === "star" && this.pointLights.size < MAX_LIGHTS) {
        var li = new THREE.PointLight(new THREE.Color(body.color), body.radius * 1.5, body.radius * 60);
        this.pointLights.set(body.id, li);
        this.scene.add(li);
      }
      if (body.type === "black_hole") {
        var dg = new THREE.RingGeometry(body.radius * 2, body.radius * 7, 64);
        var dm = new THREE.MeshBasicMaterial({ color: 0xff6600, side: THREE.DoubleSide, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false });
        var dk = new THREE.Mesh(dg, dm);
        dk.rotation.x = Math.PI / 2 + 0.2;
        this.accretionDisks.set(body.id, dk);
        this.scene.add(dk);
      }
    }
    mesh.position.set(body.px, body.py, body.pz);
    mesh.scale.setScalar(body.radius);
    // LOD: swap geometry based on screen-space size
    if (body.type !== "asteroid") {
      var camDist2 = this.camera.position.distanceTo(mesh.position);
      var screenRatio = body.radius / Math.max(camDist2, 1);
      var wantGeo = screenRatio > 0.02 ? this.sphereGeoHigh : screenRatio > 0.004 ? this.sphereGeo : this.lowSphereGeo;
      if (mesh.geometry !== wantGeo) mesh.geometry = wantGeo;
    }
    var glow = this.glowSprites.get(body.id);
    if (glow) glow.position.set(body.px, body.py, body.pz);
    var disk = this.accretionDisks.get(body.id);
    if (disk) { disk.position.set(body.px, body.py, body.pz); disk.rotation.z += (body.diskSpeed || 0.008); }
    var light = this.pointLights.get(body.id);
    if (light) light.position.set(body.px, body.py, body.pz);
    // Label sprite
    var label = this.labelSprites.get(body.id);
    if (body.name) {
      if (!label || label.userData.labelText !== body.name) {
        // Remove old label if name changed
        if (label) { this.scene.remove(label); label.material.map.dispose(); label.material.dispose(); this.labelSprites.delete(body.id); }
        var lt = this._makeLabelTex(body.name);
        var lm = new THREE.SpriteMaterial({ map: lt.texture, transparent: true, opacity: 0.9, depthTest: false });
        label = new THREE.Sprite(lm);
        label.userData.labelText = body.name;
        var labelH = body.radius * 1.2;
        label.scale.set(labelH * lt.aspect, labelH, 1);
        label.renderOrder = 1000;
        this.labelSprites.set(body.id, label);
        this.scene.add(label);
      }
      var labelH = body.radius * 1.2;
      var lt2 = this.labelSprites.get(body.id);
      label.position.set(body.px, body.py + body.radius * 1.8, body.pz);
    } else if (label) {
      this.scene.remove(label); label.material.map.dispose(); label.material.dispose(); this.labelSprites.delete(body.id);
    }
  }

  _syncTrail(body) {
    body.trail.push({ x: body.px, y: body.py, z: body.pz });
    if (body.trail.length > TRAIL_LENGTH) body.trail.shift();
    if (body.trail.length < 2) return;
    var existing = this.trailLines.get(body.id);
    if (!existing) {
      // Pre-allocate geometry with max trail length
      var posArr = new Float32Array(TRAIL_LENGTH * 3);
      var colArr = new Float32Array(TRAIL_LENGTH * 3);
      var geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(posArr, 3));
      geo.setAttribute("color", new THREE.BufferAttribute(colArr, 3));
      geo.setDrawRange(0, 0);
      var line = new THREE.Line(geo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.4, depthWrite: false }));
      this.trailLines.set(body.id, line);
      this.scene.add(line);
      existing = line;
    }
    // Update positions and colors in-place
    var posAttr = existing.geometry.attributes.position;
    var colAttr = existing.geometry.attributes.color;
    var tc = new THREE.Color(body.color);
    var len = body.trail.length;
    for (var i = 0; i < len; i++) {
      var t = body.trail[i];
      posAttr.array[i * 3] = t.x; posAttr.array[i * 3 + 1] = t.y; posAttr.array[i * 3 + 2] = t.z;
      var a = i / len;
      colAttr.array[i * 3] = tc.r * a; colAttr.array[i * 3 + 1] = tc.g * a; colAttr.array[i * 3 + 2] = tc.b * a;
    }
    posAttr.needsUpdate = true;
    colAttr.needsUpdate = true;
    existing.geometry.setDrawRange(0, len);
  }

  showArrow(from, to) {

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);

    return { hasError: true, error: error };
  }

    if (this.state.hasError) {

        style: { position: "fixed", inset: 0, background: "#0a0a1a", display: "flex", flexDirection: "column",

      },

        React.createElement("p", { style: { color: "rgba(255,255,255,0.5)", maxWidth: "400px", textAlign: "center" } },
          this.state.error ? this.state.error.message : "An unexpected error occurred."),
        React.createElement("button", {
          onClick: function() { window.location.reload(); },
          style: { padding: "10px 24px", background: "rgba(0,212,255,0.15)", border: "1px solid rgba(0,212,255,0.4)",
            borderRadius: "6px", color: "#00d4ff", cursor: "pointer", fontSize: "14px" }
        }, "Reload Page")
      );
    }
    return this.props.children;
  }
}

              if (tl) { sc.scene.remove(tl); if (tl.geometry) tl.geometry.dispose(); if (tl.material) tl.material.dispose(); }
            }
            sc.trailLines.clear();
            var meshIds = Array.from(sc.bodyMeshes.keys());
            for (var mi = 0; mi < meshIds.length; mi++) sc._rm(meshIds[mi]);
          }
          // Apply settings
          if (data.settings) {
            if (data.settings.collisionMode) setCollisionMode(data.settings.collisionMode);
            if (data.settings.simulationSpeed != null) setTimeScale(data.settings.simulationSpeed);
            if (data.settings.gravitationalConstant != null) setGravityG(data.settings.gravitationalConstant);
          }
          // Recreate bodies via existing pipeline
          var newBodies = [];
          for (var i = 0; i < data.bodies.length; i++) {
            var bd = data.bodies[i];
            var pos = bd.position || { x: 0, y: 0, z: 0 };
            var vel = bd.velocity || { x: 0, y: 0, z: 0 };
            newBodies.push(createBody(
              bd.type || "star", bd.mass || 1, bd.radius || 1,
              pos.x, pos.y, pos.z, vel.x, vel.y, vel.z,
              { color: bd.color, temperature: bd.temperature, subtype: bd.subtype, diskSpeed: bd.diskSpeed, name: bd.name }
            ));
          }
          bodiesRef.current = newBodies.slice(0, MAX_BODIES);
          bump();
          if (!wasPaused) setIsPaused(false);
        } catch (err) {
          alert("Failed to load save file: " + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }, [isPaused, bump]);

  /** Clone the selected body with a slight positional offset */
  var duplicateBody = useCallback(function() {
    if (!selectedId) return;
    var orig = bodiesRef.current.find(function(b) { return b.id === selectedId; });
    if (!orig) return;
    var offset = orig.radius * 2.5;
    var newPx = orig.px + offset, newPy = orig.py, newPz = orig.pz;
    // Try x-axis, then z-axis, then y-axis to avoid overlap
    var wouldOverlap = function(px, py, pz) {
      for (var i = 0; i < bodiesRef.current.length; i++) {
        var b = bodiesRef.current[i];
        var dx = b.px - px, dy = b.py - py, dz = b.pz - pz;
        if (Math.sqrt(dx * dx + dy * dy + dz * dz) < (b.radius + orig.radius)) return true;
      }
      return false;
    };
    if (wouldOverlap(newPx, newPy, newPz)) {
      newPx = orig.px; newPz = orig.pz + offset;
      if (wouldOverlap(newPx, newPy, newPz)) {
        newPx = orig.px; newPz = orig.pz; newPy = orig.py + offset;
      }
    }
    var clone = createBody(orig.type, orig.mass, orig.radius, newPx, newPy, newPz, orig.vx, orig.vy, orig.vz,
      { color: orig.color, temperature: orig.temperature, subtype: orig.subtype, diskSpeed: orig.diskSpeed, name: orig.name ? orig.name + " (copy)" : "" });
    addBodies([clone]);
    setSelectedId(clone.id);
  }, [selectedId, addBodies]);

  // Keyboard shortcuts: Ctrl+D duplicate, WASD+QE camera, Space pause
  var keysDown = useRef({});
  useEffect(function() {
    function onKeyDown(e) {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if ((e.ctrlKey || e.metaKey) && e.key === "d") {
        e.preventDefault();
        duplicateBody();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "z") {
        e.preventDefault();
        if (e.shiftKey) redo(); else undo();
        return;
      }
      if (e.key === " ") { e.preventDefault(); setIsPaused(function(p) { return !p; }); return; }
      keysDown.current[e.key.toLowerCase()] = true;
    }
    function onKeyUp(e) {
      keysDown.current[e.key.toLowerCase()] = false;
    }
    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);
    return function() { window.removeEventListener("keydown", onKeyDown); window.removeEventListener("keyup", onKeyUp); };
  }, [duplicateBody, undo, redo]);

  useEffect(function() {
    var cfg = BODY_TYPES[placeType];

    if (activeTool === "launch" && e.button === 0) {
      var wp = sceneRef.current.worldPos(e.clientX, e.clientY);
      if (wp) m.launchStart = wp.clone();
    }

  var onMove = useCallback(function(e) {

    var sc = sceneRef.current;
    if (m.isDragging && m.button === 0 && activeTool !== "launch") sc.pan(-e.movementX, e.movementY);
    else if (m.isDragging && m.button === 2) sc.orbit(e.movementX * 0.005, -e.movementY * 0.005);
    else if (m.isDragging && m.button === 1) sc.pan(-e.movementX, e.movementY);
    if (activeTool === "launch" && m.launchStart && m.button === 0) {
      var wp = sc.worldPos(e.clientX, e.clientY);
      if (wp) sc.showArrow(m.launchStart, wp);
    }
  }, [activeTool]);

  var onUp = useCallback(function(e) {
    if (e.target.closest(".ui-panel")) return;
    var m = ms.current;
    var sc = sceneRef.current;
    if (!m.isDragging && m.button === 0) {
      var now = Date.now();
      var dbl = now - m.lastClick < 350;
      m.lastClick = now;
      if (activeTool === "select") {
        var hit = sc.hitTest(e.clientX, e.clientY, bodiesRef.current);
        if (hit) { if (dbl) sc.follow(hit); setSelectedId(hit.id); }
        else setSelectedId(null);
      } else if (activeTool === "place") {
        var wp = sc.worldPos(e.clientX, e.clientY);
        if (wp) addBodies([createBody(placeType, placeMass, placeRadius, wp.x, wp.y, wp.z, 0, 0, 0, { subtype: placeSubtype })]);
      } else if (activeTool === "delete") {
        var hit = sc.hitTest(e.clientX, e.clientY, bodiesRef.current);
        if (hit) removeBody(hit.id);
      }
    }
    if (activeTool === "launch" && m.launchStart && m.button === 0) {
      var wp = sc.worldPos(e.clientX, e.clientY);
      if (wp && m.isDragging) {
        var vel = new THREE.Vector3().subVectors(wp, m.launchStart).multiplyScalar(0.3);

    if (field === "color") {
      if (sceneRef.current) sceneRef.current._rm(b.id);
    }

    if (field === "diskSpeed") {

    }

  }, [selectedId, bump]);

          <div className="glass-panel p-3 w-64" style={{ maxHeight: "80vh", overflowY: "auto" }}>
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full" style={{ backgroundColor: selBody.color }} />
                <span className="text-xs font-semibold text-white/90">{BODY_TYPES[selBody.type] ? BODY_TYPES[selBody.type].label : selBody.type}</span>
                {selBody.subtype && SUBTYPES[selBody.type] && SUBTYPES[selBody.type][selBody.subtype] && (
                  <span className="text-[9px] text-white/40">({SUBTYPES[selBody.type][selBody.subtype].label})</span>
                )}
              </div>
              <div className="flex gap-1">
                <button onClick={function() { if (sceneRef.current) sceneRef.current.follow(selBody); }} className="p-1 rounded hover:bg-white/10" title="Follow">
                  <Icon name="eye" size={12} />
                </button>
                <button onClick={function() { setSelectedId(null); }} className="p-1 rounded hover:bg-white/10">
                  <Icon name="x" size={12} />
                </button>
              </div>
            </div>
            <div className="space-y-1.5 text-[10px] text-white/60">
              <div className="flex justify-between"><span>ID</span><span className="text-white/40">#{selBody.id}</span></div>
              <div className="flex items-center gap-1.5">
                <span className="text-white/40">Name</span>
                <input type="text" maxLength={30} value={selBody.name || ""} placeholder="Unnamed"
                  onChange={function(e) { updSel("name", e.target.value); }}
                  className="flex-1 bg-white/5 border border-white/10 rounded px-1.5 py-0.5 text-[10px] text-white/80 outline-none focus:border-cyan-400/40"
                  onClick={function(e) { e.stopPropagation(); }} />
              </div>
              <div>
                <div className="flex justify-between mb-0.5"><span>Mass</span><span>{fmtUnit(selBody.mass, "mass", selBody.type)}</span></div>
                <input type="range" min={BODY_TYPES[selBody.type] ? BODY_TYPES[selBody.type].minMass : 0.001}
                  max={BODY_TYPES[selBody.type] ? BODY_TYPES[selBody.type].maxMass : 200000}
                  step={((BODY_TYPES[selBody.type] ? BODY_TYPES[selBody.type].maxMass : 200000) - (BODY_TYPES[selBody.type] ? BODY_TYPES[selBody.type].minMass : 0.001)) / 200}
                  value={selBody.mass} onChange={function(e) { updSel("mass", parseFloat(e.target.value)); }} className="slider-cosmic w-full" />
              </div>
              <div>
                <div className="flex justify-between mb-0.5"><span>Radius</span><span>{fmtUnit(selBody.radius, "radius", selBody.type)}</span></div>
                <input type="range" min={BODY_TYPES[selBody.type] ? BODY_TYPES[selBody.type].minRadius : 0.05}
                  max={BODY_TYPES[selBody.type] ? BODY_TYPES[selBody.type].maxRadius : 8}
                  step={0.01} value={selBody.radius} onChange={function(e) { updSel("radius", parseFloat(e.target.value)); }} className="slider-cosmic w-full" />
              </div>
              <div className="flex justify-between"><span>Position</span><span>({selBody.px.toFixed(1)}, {selBody.py.toFixed(1)}, {selBody.pz.toFixed(1)}) u</span></div>
              <div className="flex justify-between"><span>Speed</span><span>{Math.sqrt(selBody.vx * selBody.vx + selBody.vy * selBody.vy + selBody.vz * selBody.vz).toFixed(2)} u/s</span></div>

              {/* ─── Velocity Editor ─── */}
              <div className="border-t border-white/10 pt-1.5 mt-1">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-white/40">Velocity</span>
                  <button onClick={function() { updSel("vx", 0); updSel("vy", 0); updSel("vz", 0); }}
                    className="px-1.5 py-0.5 rounded text-[9px] border border-white/10 text-white/40 hover:border-white/30 hover:text-white/60 transition"
                    title="Zero velocity">
                    <Icon name="stop" size={10} /> Zero
                  </button>
                </div>
                {[["vx", "X"], ["vy", "Y"], ["vz", "Z"]].map(function(v) {
                  var maxV = Math.min(VEL_CAP, Math.max(10, Math.abs(selBody[v[0]]) * 1.5));
                  return <div key={v[0]} className="flex items-center gap-1.5 mb-0.5">
                    <span className="w-3 text-white/30 text-right">{v[1]}</span>
                    <input type="range" min={-maxV} max={maxV} step={0.01} value={selBody[v[0]]}
                      onChange={function(e) { updSel(v[0], parseFloat(e.target.value)); }} className="slider-cosmic flex-1" />
                    <span className="w-14 text-right text-white/40">{selBody[v[0]].toFixed(1)} u/s</span>
                  </div>;
                })}
              </div>

              {/* ─── Orbit Prediction ─── */}
              <div className="border-t border-white/10 pt-1.5 mt-1">
                <label className="flex items-center gap-2 text-[10px] text-white/50 cursor-pointer mb-1">
                  <input type="checkbox" checked={showPrediction} onChange={function(e) { setShowPrediction(e.target.checked); }} className="rounded" />
                  Orbit Prediction
                </label>
                {showPrediction && (
                  <div>
                    <div className="flex justify-between mb-0.5 text-white/30"><span>Steps</span><span>{predictionSteps}</span></div>
                    <input type="range" min="100" max="2000" step="50" value={predictionSteps}
                      onChange={function(e) { setPredictionSteps(parseInt(e.target.value)); }} className="slider-cosmic w-full" />
                  </div>
                )}
              </div>

              {/* ─── Orbital Elements ─── */}
              {bodiesRef.current.length > 1 && (function() {
                var oe = computeOrbitalElements(selBody, bodiesRef.current, gravityG);
                if (!oe) return null;
                return <div className="border-t border-white/10 pt-1.5 mt-1">
                  <div className="text-white/40 mb-1">Orbit around {oe.centralName}</div>
                  <div className="flex justify-between"><span>Eccentricity</span><span>{oe.ecc.toFixed(3)}</span></div>
                  {oe.bound ? <div>
                    <div className="flex justify-between"><span>Semi-major axis</span><span>{oe.semiMajor.toFixed(1)} u</span></div>
                    <div className="flex justify-between"><span>Periapsis</span><span>{oe.periapsis.toFixed(1)} u</span></div>
                    <div className="flex justify-between"><span>Apoapsis</span><span>{oe.apoapsis.toFixed(1)} u</span></div>
                    <div className="flex justify-between"><span>Period</span><span>{oe.period < 60 ? oe.period.toFixed(1) + "s" : (oe.period / 60).toFixed(1) + "m"}</span></div>
                  </div> : <div className="text-amber-400/50 text-[9px]">Unbound (hyperbolic)</div>}
                </div>;
              })()}

              {/* ─── Star-specific controls ─── */}
              {selBody.type === "star" && (
                <div className="border-t border-white/10 pt-1.5 mt-1">
                  <div className="flex justify-between mb-0.5"><span>Temperature</span><span>{selBody.temperature.toFixed(0)} K</span></div>
                  <input type="range" min="2500" max="35000" step="100"
                    value={selBody.temperature} onChange={function(e) { updSel("temperature", parseFloat(e.target.value)); }} className="slider-cosmic w-full" />
                  <div className="flex justify-between mt-1 mb-0.5"><span>Color Preview</span>
                    <div className="flex gap-0.5">
                      {[3000, 5000, 6000, 8000, 15000, 30000].map(function(t) {
                        return <button key={t} onClick={function() { updSel("temperature", t); }}
                          className="w-3 h-3 rounded-full border border-white/20 hover:border-white/50"
                          style={{ backgroundColor: "#" + tempToColor(t).getHexString() }}
                          title={t + " K"} />;
                      })}
                    </div>
                  </div>
                </div>
              )}

              {/* ─── Black Hole-specific controls ─── */}
              {selBody.type === "black_hole" && (
                <div className="border-t border-white/10 pt-1.5 mt-1">
                  <div className="flex justify-between mb-0.5"><span>Disk Spin Speed</span><span>{(selBody.diskSpeed * 1000).toFixed(1)}</span></div>
                  <input type="range" min="1" max="50" step="0.5"
                    value={selBody.diskSpeed * 1000} onChange={function(e) { updSel("diskSpeed", parseFloat(e.target.value) / 1000); }} className="slider-cosmic w-full" />
                </div>
              )}

              {/* ─── Rocky Planet subtypes ─── */}
              {selBody.type === "planet_rocky" && SUBTYPES.planet_rocky && (
                <div className="border-t border-white/10 pt-1.5 mt-1">
                  <div className="text-white/40 mb-1">Surface Type</div>
                  <div className="grid grid-cols-3 gap-1">
                    {Object.entries(SUBTYPES.planet_rocky).map(function(entry) {
                      var key = entry[0], sub = entry[1];
                      return <button key={key} onClick={function() { updSel("subtype", key); }}
                        className={"px-1.5 py-1 rounded text-[9px] border " + (selBody.subtype === key ? "border-cyan-400/60 bg-cyan-500/15 text-cyan-300" : "border-white/10 text-white/50 hover:border-white/30")}>
                        <div className="w-2 h-2 rounded-full mx-auto mb-0.5" style={{ backgroundColor: sub.color }} />
                        {sub.label}
                      </button>;
                    })}
                  </div>
                </div>
              )}

              {/* ─── Gas Giant subtypes ─── */}
              {selBody.type === "planet_gas" && SUBTYPES.planet_gas && (
                <div className="border-t border-white/10 pt-1.5 mt-1">
                  <div className="text-white/40 mb-1">Gas Type</div>
                  <div className="grid grid-cols-2 gap-1">
                    {Object.entries(SUBTYPES.planet_gas).map(function(entry) {
                      var key = entry[0], sub = entry[1];
                      return <button key={key} onClick={function() { updSel("subtype", key); }}
                        className={"px-1.5 py-1 rounded text-[9px] border " + (selBody.subtype === key ? "border-cyan-400/60 bg-cyan-500/15 text-cyan-300" : "border-white/10 text-white/50 hover:border-white/30")}>
                        <div className="w-2 h-2 rounded-full mx-auto mb-0.5" style={{ backgroundColor: sub.color }} />
                        {sub.label}
                      </button>;
                    })}
                  </div>
                </div>
              )}

              {/* ─── Moon subtypes ─── */}
              {selBody.type === "moon" && SUBTYPES.moon && (
                <div className="border-t border-white/10 pt-1.5 mt-1">
                  <div className="text-white/40 mb-1">Surface Type</div>
                  <div className="grid grid-cols-3 gap-1">
                    {Object.entries(SUBTYPES.moon).map(function(entry) {
                      var key = entry[0], sub = entry[1];
                      return <button key={key} onClick={function() { updSel("subtype", key); }}
                        className={"px-1.5 py-1 rounded text-[9px] border " + (selBody.subtype === key ? "border-cyan-400/60 bg-cyan-500/15 text-cyan-300" : "border-white/10 text-white/50 hover:border-white/30")}>
                        <div className="w-2 h-2 rounded-full mx-auto mb-0.5" style={{ backgroundColor: sub.color }} />
                        {sub.label}
                      </button>;
                    })}
                  </div>
                </div>
              )}

              {/* ─── Asteroid subtypes ─── */}
              {selBody.type === "asteroid" && SUBTYPES.asteroid && (
                <div className="border-t border-white/10 pt-1.5 mt-1">
                  <div className="text-white/40 mb-1">Composition</div>
                  <div className="grid grid-cols-3 gap-1">
                    {Object.entries(SUBTYPES.asteroid).map(function(entry) {
                      var key = entry[0], sub = entry[1];
                      return <button key={key} onClick={function() { updSel("subtype", key); }}
                        className={"px-1.5 py-1 rounded text-[9px] border " + (selBody.subtype === key ? "border-cyan-400/60 bg-cyan-500/15 text-cyan-300" : "border-white/10 text-white/50 hover:border-white/30")}>
                        <div className="w-2 h-2 rounded-full mx-auto mb-0.5" style={{ backgroundColor: sub.color }} />
                        {sub.label}
                      </button>;
                    })}
                  </div>
                </div>
              )}
            </div>
            <div className="flex gap-2 mt-2">
              <button onClick={duplicateBody}
                className="flex-1 px-2 py-1 rounded text-[10px] bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 hover:bg-cyan-500/20 transition flex items-center justify-center gap-1"
                title="Duplicate (Ctrl+D)">
                <Icon name="copy" size={10} /> Duplicate
              </button>
              <button onClick={function() { removeBody(selBody.id); }}
                className="flex-1 px-2 py-1 rounded text-[10px] bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30 transition">
                Delete
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Bottom-right: sim clock + scale bar + controls hint */}
      <div className="absolute bottom-2 right-2 z-10 pointer-events-none text-right">
        <div className="glass-panel inline-block px-3 py-1.5 mb-1 text-[10px]">
          <span className="text-white/50">T = </span>
          <span className="text-cyan-300/70 font-mono">{
            (function() {
              var t = Math.abs(simElapsed);
              if (t < 60) return t.toFixed(1) + "s";
              if (t < 3600) return (t / 60).toFixed(1) + "m";
              if (t < 86400) return (t / 3600).toFixed(1) + "h";
              return (t / 86400).toFixed(1) + "d";
            })()
          }</span>
          <span className="text-white/30 mx-2">|</span>
          <span className="text-white/50">Zoom: </span>
          <span className="text-white/40 font-mono">{
            sceneRef.current ? (sceneRef.current.camDist < 100 ? sceneRef.current.camDist.toFixed(0) + " u" :
              sceneRef.current.camDist < 10000 ? (sceneRef.current.camDist / 1000).toFixed(1) + " ku" :
              (sceneRef.current.camDist / 1000).toFixed(0) + " ku") : "—"
          }</span>
        </div>
        <div className="text-[9px] text-white/15">
          WASD: pan {"\u00B7"} QE: orbit {"\u00B7"} Scroll: zoom {"\u00B7"} Space: pause {"\u00B7"} Right-drag: orbit
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);

  </script>
</body>
</html>
